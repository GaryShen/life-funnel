<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Noto+Serif+TC:wght@400;500;600;700;900&family=IBM+Plex+Mono:wght@400;500&family=Special+Elite&display=swap" rel="stylesheet">

<style>
  :root {
    /* paper palette — overridden by tweaks */
    --paper:    #ece2cf;
    --paper-2:  #ddcfb4;
    --ink:      #2b1d10;
    --ink-soft: #5a4630;
    --sand:     #c8893e;
    --sand-2:   #e0a44a;
    --sand-hl:  #f5cd7e;
    --wood:     #3e2716;
    --wood-2:   #5e3a20;
    --brass:    #b48946;
    --brass-2:  #876028;
    --accent:   #9c2a1d;
  }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: "Cormorant Garamond", "Noto Serif TC", Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse at 50% 0%, transparent 40%, rgba(60,30,5,.18) 100%),
      radial-gradient(ellipse at 50% 120%, rgba(60,30,5,.22), transparent 60%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 .18 0 0 0 0 .12 0 0 0 0 .05 0 0 0 .35 0'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='.35'/></svg>");
    mix-blend-mode: multiply;
    z-index: 1;
  }
  body::after {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background-image:
      repeating-linear-gradient(123deg, rgba(80,50,20,.04) 0 1px, transparent 1px 7px),
      repeating-linear-gradient(37deg, rgba(80,50,20,.025) 0 1px, transparent 1px 11px);
    z-index: 2;
  }

  #app { position: relative; z-index: 3; }

  .eng { font-family: "Cormorant Garamond", Georgia, serif; font-style: italic; letter-spacing: .01em; }
  .zh  { font-family: "Noto Serif TC", "Cormorant Garamond", serif; }
  .mono{ font-family: "IBM Plex Mono", ui-monospace, monospace; }
  .stamp{ font-family: "Special Elite", "IBM Plex Mono", monospace; letter-spacing: .04em; }
  .num{ font-variant-numeric: tabular-nums lining-nums; }

  .page {
    max-width: 1280px;
    margin: 0 auto;
    padding: 28px 28px 60px;
    position: relative;
  }

  .masthead {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: end;
    gap: 24px;
    padding-bottom: 16px;
    border-bottom: 1.5px solid var(--ink);
    position: relative;
  }
  .masthead::after{
    content:""; position:absolute; left:0; right:0; bottom:-5px;
    border-bottom: .5px solid var(--ink-soft);
  }
  .mast-l, .mast-r { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-soft); }
  .mast-r { text-align: right; }
  .mast-l b, .mast-r b { color: var(--ink); font-weight: 600; }
  .mast-c { text-align: center; }
  .mast-c .title-zh {
    font-family: "Noto Serif TC", serif;
    font-weight: 900;
    font-size: 56px;
    line-height: 1;
    letter-spacing: .12em;
    margin: 0;
  }
  .mast-c .title-en {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-weight: 500;
    font-size: 22px;
    color: var(--ink-soft);
    margin-top: 4px;
    letter-spacing: .06em;
  }
  .mast-c .ornament {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    color: var(--ink-soft); font-size: 12px; letter-spacing: .3em;
    margin-top: 16px; text-transform: uppercase;
    white-space: nowrap;
  }
  .ornament hr {
    border: 0; border-top: 1px solid currentColor; flex: 0 0 48px;
  }

  .main {
    display: grid;
    grid-template-columns: 280px 1fr 280px;
    gap: 28px;
    margin-top: 36px;
  }
  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; }
  }

  .panel {
    background:
      linear-gradient(to bottom, rgba(255,255,255,.08), rgba(0,0,0,.04)),
      var(--paper);
    border: 1px solid var(--ink-soft);
    padding: 22px 22px 26px;
    position: relative;
    box-shadow:
      0 0 0 4px var(--paper),
      0 0 0 5px var(--ink-soft),
      0 18px 30px -22px rgba(0,0,0,.5);
  }
  .panel + .panel { margin-top: 28px; }
  .panel-title {
    font-family: "Noto Serif TC", serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: .3em;
    text-transform: uppercase;
    color: var(--ink);
    margin: 0 0 4px;
  }
  .panel-title .en {
    display: block;
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-weight: 500;
    letter-spacing: .05em;
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 2px;
    text-transform: none;
  }
  .panel-rule {
    border: 0;
    border-top: 1px solid var(--ink);
    margin: 12px 0 18px;
    opacity: .8;
  }
  .panel-rule.dashed { border-top: 1px dashed var(--ink-soft); }

  .field { margin-bottom: 18px; }
  .field-label {
    display: flex; align-items: baseline; justify-content: space-between;
    font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
    color: var(--ink-soft); margin-bottom: 6px;
  }
  .field-label .zh { color: var(--ink); font-weight: 600; letter-spacing: .1em; }
  .field-label .en { font-style: italic; font-size: 11px; }

  .num-input {
    display: flex; align-items: baseline; gap: 6px;
    padding: 6px 10px;
    border: 1px solid var(--ink-soft);
    background: rgba(255,255,255,.18);
  }
  .num-input input {
    appearance: none;
    -moz-appearance: textfield;
    border: 0; outline: 0; background: transparent;
    font-family: "Cormorant Garamond", serif;
    font-weight: 600;
    font-size: 34px;
    color: var(--ink);
    width: 100%;
    padding: 0;
  }
  .num-input input::-webkit-outer-spin-button,
  .num-input input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .num-input .unit {
    font-family: "Noto Serif TC", serif;
    font-size: 14px;
    color: var(--ink-soft);
    letter-spacing: .1em;
  }
  .num-input:focus-within { border-color: var(--accent); box-shadow: inset 0 0 0 1px var(--accent); }
  /* Date input variant — smaller text & uses system date picker. */
  .num-input.date-input { padding: 10px 10px; }
  .num-input.date-input input[type="date"] {
    font-family: "IBM Plex Mono", ui-monospace, monospace;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: .04em;
    color: var(--ink);
    width: 100%;
    background: transparent;
    border: 0;
    outline: 0;
    padding: 0;
  }
  .num-input.date-input input[type="date"]::-webkit-calendar-picker-indicator {
    filter: sepia(0.4) saturate(0.8) hue-rotate(-10deg);
    cursor: pointer;
  }

  /* Reminders — fill-in-the-blank prose list. Inputs blend into the page
     until hover/focus, keeping the vintage feel; ✕ stays invisible until
     hovering the row so the panel reads clean. */
  .reminder-list { display: flex; flex-direction: column; }
  .reminder-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 4px 8px;
    padding: 10px 0;
    border-bottom: 1px dashed rgba(60,40,20,.18);
    align-items: baseline;
  }
  .reminder-row:last-of-type { border-bottom: 0; }
  .reminder-row input,
  .reminder-row select {
    appearance: none;
    -moz-appearance: textfield;
    border: 0; outline: 0; background: transparent;
    color: var(--ink);
    font: inherit;
    padding: 2px 2px;
    border-bottom: 1px dotted transparent;
    min-width: 0;
    transition: border-color .12s ease;
  }
  .reminder-row input:hover,
  .reminder-row select:hover { border-bottom-color: var(--ink-soft); }
  .reminder-row input:focus,
  .reminder-row select:focus { border-bottom-color: var(--accent); }
  .reminder-row input::-webkit-outer-spin-button,
  .reminder-row input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  .reminder-label {
    grid-column: 1;
    font-family: "Noto Serif TC", serif;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: .04em;
    width: 100%;
  }
  .reminder-delete {
    grid-column: 2; grid-row: 1;
    appearance: none; border: 0; background: transparent;
    color: rgba(60,40,20,.3);
    cursor: pointer; padding: 0 2px;
    font-size: 12px; line-height: 1;
    opacity: 0;
    transition: opacity .12s ease, color .12s ease;
  }
  .reminder-row:hover .reminder-delete,
  .reminder-row:focus-within .reminder-delete { opacity: 1; }
  .reminder-delete:hover { color: var(--accent); }

  .reminder-meta {
    grid-column: 1 / -1;
    display: flex; flex-wrap: wrap;
    align-items: baseline;
    gap: 2px 6px;
    font-size: 12px;
    color: var(--ink-soft);
    letter-spacing: .02em;
  }
  .reminder-period {
    font-family: "Noto Serif TC", serif;
    color: var(--ink-soft);
    padding-right: 14px;
    cursor: pointer;
    background-image:
      linear-gradient(45deg, transparent 50%, var(--ink-soft) 50%),
      linear-gradient(135deg, var(--ink-soft) 50%, transparent 50%);
    background-position: right 3px top 50%, right 0 top 50%;
    background-size: 4px 4px, 4px 4px;
    background-repeat: no-repeat;
  }
  .reminder-amount {
    width: 3em;
    text-align: center;
    font-family: "Cormorant Garamond", serif;
    font-weight: 600;
    font-size: 16px;
    color: var(--ink);
  }
  .reminder-unit {
    width: 2.2em;
    text-align: center;
    font-family: "Noto Serif TC", serif;
    color: var(--ink-soft);
  }
  .reminder-result {
    margin-left: auto;
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    color: var(--ink-soft);
    white-space: nowrap;
  }
  .reminder-result .num {
    font-style: normal; font-weight: 600;
    color: var(--ink);
    margin: 0 2px;
  }
  .reminder-empty {
    text-align: center;
    font-size: 12px;
    color: var(--ink-soft);
    font-style: italic;
    padding: 14px 0;
    margin: 0;
  }
  .reminder-add {
    appearance: none;
    border: 1px dashed var(--ink-soft);
    background: transparent;
    color: var(--ink-soft);
    font-family: "Noto Serif TC", serif;
    font-size: 12px;
    letter-spacing: .1em;
    padding: 8px;
    margin-top: 10px;
    cursor: pointer;
    transition: color .15s ease, border-color .15s ease, border-style .15s ease;
  }
  .reminder-add:hover {
    color: var(--ink);
    border-color: var(--ink);
    border-style: solid;
  }

  .seg {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    border: 1px solid var(--ink-soft);
  }
  .seg button {
    appearance: none; border: 0; background: transparent;
    padding: 10px 6px;
    font-family: "Noto Serif TC", serif;
    font-size: 15px; letter-spacing: .15em;
    color: var(--ink-soft);
    cursor: pointer;
    border-right: 1px solid var(--ink-soft);
    position: relative;
  }
  .seg button:last-child { border-right: 0; }
  .seg button .en {
    display: block; font-family: "Cormorant Garamond", serif; font-style: italic;
    font-size: 10px; letter-spacing: .04em; margin-top: 2px; opacity: .7;
  }
  .seg button[data-on="true"] {
    background: var(--ink);
    color: var(--paper);
  }
  .seg button[data-on="true"] .en { opacity: .85; }
  .seg button:hover:not([data-on="true"]) { background: rgba(0,0,0,.05); color: var(--ink); }

  .stat {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: baseline;
    padding: 10px 0;
    border-bottom: 1px dashed var(--ink-soft);
  }
  .stat:last-child { border-bottom: 0; }
  .stat .k {
    font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
    color: var(--ink-soft);
  }
  .stat .k .zh { display: block; color: var(--ink); font-weight: 600; letter-spacing: .12em; font-size: 13px; text-transform: none; margin-bottom: 1px; }
  .stat .v {
    font-family: "Cormorant Garamond", serif;
    font-weight: 600;
    font-size: 28px;
    color: var(--ink);
  }
  .stat .v .u {
    font-family: "Noto Serif TC", serif;
    font-size: 12px;
    color: var(--ink-soft);
    margin-left: 4px;
    letter-spacing: .1em;
  }

  .pct-wrap {
    margin-top: 6px;
  }
  .pct-bar {
    height: 10px;
    background: rgba(0,0,0,.07);
    border: 1px solid var(--ink-soft);
    position: relative;
    overflow: hidden;
  }
  .pct-bar-fill {
    position: absolute; inset: 0 auto 0 0;
    background:
      repeating-linear-gradient(45deg, var(--ink) 0 6px, var(--ink-soft) 6px 12px);
    width: 0%;
    transition: width .6s ease;
  }
  .pct-row {
    display: flex; justify-content: space-between;
    margin-top: 6px;
    font-size: 11px; letter-spacing: .15em; text-transform: uppercase; color: var(--ink-soft);
  }
  .pct-row .num { font-family: "Cormorant Garamond", serif; font-weight: 700; font-size: 16px; color: var(--ink); letter-spacing: 0; }

  .hourglass-col {
    display: flex; flex-direction: column; align-items: center;
    position: relative;
  }
  .hourglass-frame {
    width: 100%;
    max-width: 480px;
    aspect-ratio: 0.62 / 1;
    position: relative;
  }
  .hourglass-frame svg.silhouette,
  .hourglass-frame canvas.sand {
    position: absolute; inset: 0; width: 100%; height: 100%;
  }
  .hourglass-frame canvas.sand { z-index: 2; }
  .hourglass-frame svg.silhouette { z-index: 3; pointer-events: none; }

  .quote-block {
    text-align: center;
    margin-top: 30px;
    max-width: 620px;
  }
  /* When the quote sits ABOVE the hourglass (modifier from app.jsx),
     pull it up flush with the side panels and breathe between it and
     the glass. */
  .quote-block.quote-top {
    margin-top: 0;
    margin-bottom: 22px;
    padding: 0 12px 14px;
    border-bottom: 1px solid var(--ink-soft);
    position: relative;
    /* Reserve room for longest quote so 9s rotation doesn't reflow the hourglass below. */
    min-height: 200px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .quote-block.quote-top::before,
  .quote-block.quote-top::after {
    content: "❦";
    position: absolute;
    bottom: -10px;
    background: var(--paper);
    color: var(--ink-soft);
    font-size: 12px;
    padding: 0 8px;
  }
  .quote-block.quote-top::before { left: 50%; transform: translateX(-50%); }
  .quote-block.quote-top::after  { display: none; }
  .quote-zh {
    font-family: "Noto Serif TC", serif;
    font-weight: 500;
    font-size: 22px;
    line-height: 1.55;
    letter-spacing: .04em;
    color: var(--ink);
    margin: 0;
    text-wrap: pretty;
  }
  .quote-en {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-weight: 400;
    font-size: 17px;
    line-height: 1.4;
    color: var(--ink-soft);
    margin: 10px 0 0;
    text-wrap: pretty;
  }
  .quote-attr {
    font-family: "Cormorant Garamond", serif;
    font-size: 12px;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 10px;
  }

  .date-stamp {
    position: absolute;
    top: 8px; right: 24px;
    color: var(--accent);
    border: 2px solid var(--accent);
    padding: 6px 12px;
    transform: rotate(-6deg);
    font-family: "Special Elite", monospace;
    font-size: 11px;
    letter-spacing: .15em;
    opacity: .85;
    z-index: 5;
    pointer-events: none;
  }
  .date-stamp .big { display: block; font-size: 18px; font-weight: 700; letter-spacing: .08em; }

  .footer {
    margin-top: 56px;
    padding-top: 16px;
    border-top: 1px solid var(--ink-soft);
    display: flex; justify-content: space-between;
    font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: var(--ink-soft);
  }

  .hg-caption {
    display: flex; justify-content: space-between; align-items: center;
    width: 100%; max-width: 480px;
    margin-top: 14px;
    padding: 0 4px;
    font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--ink-soft);
  }
  .hg-caption b { color: var(--ink); font-weight: 600; }

  .chip {
    display: inline-block;
    padding: 2px 8px;
    border: 1px solid var(--ink-soft);
    font-size: 10px;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  .link-btn {
    appearance: none;
    background: transparent;
    border: 0;
    border-bottom: 1px solid var(--ink);
    padding: 4px 0;
    margin-top: 8px;
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-size: 14px;
    color: var(--ink);
    cursor: pointer;
    letter-spacing: .04em;
  }
  .link-btn:hover { color: var(--accent); border-color: var(--accent); }

  /* Floating tweaks toggle — user-visible entry into the Tweaks panel.
     The panel itself listens for window messages, so a button posting
     __activate_edit_mode is enough to open it. */
  .tweaks-fab {
    position: fixed;
    right: 18px;
    bottom: 18px;
    z-index: 2147483645;
    appearance: none;
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1px solid var(--ink-soft);
    background: var(--paper);
    color: var(--ink);
    box-shadow: 0 6px 18px -8px rgba(0,0,0,.45), 0 0 0 3px var(--paper);
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: transform .15s ease;
  }
  .tweaks-fab:hover { transform: translateY(-1px) rotate(30deg); }
  .tweaks-fab:active { transform: translateY(0); }
</style>
</head>
<body>
  <div id="app"></div>

  <button id="tweaks-fab" class="tweaks-fab" aria-label="Open tweaks panel" title="Tweaks · 調整">⚙</button>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="hourglass.jsx"></script>
  <script type="text/babel" src="quotes.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script>
    // Bridge: the Tweaks panel listens for parent-window __activate_edit_mode.
    // In standalone deploy there is no parent design-tool, so the floating ⚙
    // button posts the same message back to this window to open the panel.
    document.getElementById('tweaks-fab').addEventListener('click', () => {
      window.postMessage({ type: '__activate_edit_mode' }, '*');
    });
  </script>
</body>
</html>
